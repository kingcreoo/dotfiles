# Settings

# Environment Variables
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct

# Start on launch
exec-once = waybar & hyprpaper

# Monitors (Sometimes mine load differently, as I have two gpus and sometimes they register differently.)
monitor=DP-2,1920x1080@165,1920x0,1
monitor=DP-5,1920x1080@165,1920x0,1
monitor=DP-1,1920x1080@144,0x0,1
monitor=HDMI-A-1,1920x1080@60,0x0,1
monitor=HDMI-A-2,1920x1080@60,0x0,1

# Inputs
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0
    accel_profile = flat
    force_no_accel = true
}

# General
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 0
    col.active_border = rgb(e60000) rgb(ff6666) 45deg
    col.inactive_border = rgb(999999) 

    layout = dwindle

    allow_tearing = false
}

# Decoration
decoration {
  rounding = 5
    
    blur {
        enabled = true
        size = 6
        passes = 1
    }

    active_opacity = 1.0
    inactive_opacity = 0.8
    fullscreen_opacity = 1.0

    drop_shadow = yes
    shadow_range = 20
    shadow_render_power = 3
    col.shadow = 0x66000000
}

# Animation
animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Layout / Misc

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
}

gestures {
    workspace_swipe = off
}

misc {
    force_default_wallpaper = 0
}
